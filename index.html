<script>
  Papa.parse("food-drink-100.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {

      let data = results.data.filter(row =>
        Object.values(row).some(v => String(v ?? "").trim() !== "")
      );

      if (!data.length) {
        document.getElementById("table").innerHTML = "<p>No data found in CSV.</p>";
        return;
      }

      // IMPORTANT: match your exact column name (case sensitive)
      const rankColumn = "RANK";

      // Sort by RANK
      data.sort((a, b) => Number(a[rankColumn]) - Number(b[rankColumn]));

      // Automatically get ALL columns from CSV
      const columns = Object.keys(data[0]);

      const rows = data.map(row =>
        columns.map(col => row[col])
      );

      new gridjs.Grid({
        columns: columns,
        data: rows,
        search: true,       // ✅ keep search
        sort: false,        // 🔒 lock order to RANK
        pagination: false   // full Top 100 view
      }).render(document.getElementById("table"));
    },
    error: function(err) {
      document.getElementById("table").innerHTML =
        "<p>Could not load the CSV file. Check filename and path.</p>";
      console.error(err);
    }
  });
</script>
